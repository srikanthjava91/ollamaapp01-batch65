<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Ollama Chatbot</title>

<link rel="stylesheet"
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>

<body>
	<div class="container mt-4">

		<div class="d-flex justify-content-between">
			<h2>🤖 Ollama Chatbot (Offline)</h2>

			<div>
				<a th:href="@{/clearHistory}" class="btn btn-danger btn-sm">Clear Chat</a> 
				<a th:href="@{/logout}" class="btn btn-dark btn-sm">Logout</a>
			</div>
		</div>

		<hr>

		<form th:action="@{/sendMessage}" method="post" class="d-flex mb-3">
			<input type="text" name="message" class="form-control me-2"
				placeholder="Type your message..." required>
			<button type="submit" class="btn btn-primary">Send</button>
		</form>

		<div class="card p-3 shadow"
			style="height: 450px; overflow-y: scroll;">

			<div th:each="chat : ${chatHistory}">
				<p>
					<b>User:</b> <span th:text="${chat.userMessage}"></span>
				</p>
				<p>
					<b>Bot:</b> <span th:text="${chat.botReply}"></span>
				</p>
				<p class="text-muted" th:text="${chat.time}"></p>
				<hr>
			</div>

		</div>

	</div>
</body>
</html>
